<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winnipeg Tree Finder</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>Winnipeg Public Tree Explorer</h1>
    </header>

    <main>
        <section class="search-box">
            <label for="search-input">Enter Tree Common Name (e.g., Elm, Oak, Ash):</label>
            <div class="search-row">
                <input type="text" id="search-input" placeholder="Search trees...">
                <button id="search-btn">Search</button>
            </div>
        </section>

        <section class="results-container">
            <div id="status-message" class="info-msg">Enter a tree name to begin searching.</div>
            
            <table id="results-table" class="hidden">
                <thead>
                    <tr>
                        <th>Common Name</th>
                        <th>Botanical Name</th>
                        <th>Diameter at Breast Height (cm)</th>
                        <th>Street Address</th>
                        <th>Neighbourhood</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
